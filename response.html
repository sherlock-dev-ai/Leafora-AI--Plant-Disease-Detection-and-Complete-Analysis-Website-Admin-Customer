    <!-- Bootstrap Icons -->

<style>
    @import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@300&display=swap");
    
    * {
        font-family: "Quicksand", sans-serif;
    }

    body {
        margin: 0;
        padding: 0;
        background: #0a0a0a !important;
        overflow: hidden;
    }

    /* Background Animation Elements (Optimized) */
    .bg-animation {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: radial-gradient(circle at center, #111 0%, #000 100%);
    }

    .blob {
        position: absolute;
        width: 400px;
        height: 400px;
        background: linear-gradient(45deg, rgba(34, 197, 94, 0.1), rgba(74, 222, 128, 0.05));
        filter: blur(50px);
        border-radius: 50%;
        animation: moveBlob 20s infinite alternate ease-in-out;
        will-change: transform;
    }

    .blob:nth-child(1) { top: -100px; left: -100px; animation-duration: 25s; }
    .blob:nth-child(2) { 
        bottom: -150px; 
        right: -100px; 
        background: linear-gradient(45deg, rgba(34, 197, 94, 0.08), rgba(59, 130, 246, 0.05));
        animation-duration: 30s;
        animation-delay: -5s;
    }

    @keyframes moveBlob {
        0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
        33% { transform: translate3d(100px, 50px, 0) rotate(120deg) scale(1.1); }
        66% { transform: translate3d(-50px, 150px, 0) rotate(240deg) scale(0.9); }
        100% { transform: translate3d(0, 0, 0) rotate(360deg) scale(1); }
    }

    /* Floating Dots Animation */
    .dot {
        position: absolute;
        width: 4px;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        pointer-events: none;
        animation: floatDot 15s infinite linear;
        will-change: transform;
    }

    @keyframes floatDot {
        0% { transform: translate3d(0, 100vh, 0); opacity: 0; }
        10%, 90% { opacity: 1; }
        100% { transform: translate3d(100px, -10vh, 0); opacity: 0; }
    }

    /* Lines Animation Design */
    .lines-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 0;
    }

    .line-box {
        position: absolute;
        transition: all 1.8s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: top, left, width, height, transform;
        opacity: 0; /* Hidden initially, shown by JS */
    }

    .line-box i {
        display: block;
        width: 100%;
        height: 100%;
        border: 2px solid #fff;
        opacity: 0.15;
        transition: all 1.8s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: transform, border-radius, border-color, filter;
    }

    /* Base styles for the 3 circles */
    .line-box:nth-child(1) i { border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%; animation: wave1 15s infinite ease-in-out, lineGlow 8s infinite ease-in-out; }
    .line-box:nth-child(2) i { border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%; animation: wave2 18s infinite ease-in-out, lineGlow 8s infinite ease-in-out; animation-delay: 0s, 1s; }
    .line-box:nth-child(3) i { border-radius: 50%; animation: wave3 20s infinite ease-in-out, lineGlow 8s infinite ease-in-out; animation-delay: 0s, 2s; }

    @keyframes wave1 {
        0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
        33% { transform: translate3d(50px, -40px, 0) rotate(120deg) scale(1.05); }
        66% { transform: translate3d(-30px, 60px, 0) rotate(240deg) scale(0.95); }
        100% { transform: translate3d(0, 0, 0) rotate(360deg) scale(1); }
    }
    @keyframes wave2 {
        0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1.05); }
        33% { transform: translate3d(-60px, 30px, 0) rotate(-120deg) scale(1); }
        66% { transform: translate3d(40px, -50px, 0) rotate(-240deg) scale(1.1); }
        100% { transform: translate3d(0, 0, 0) rotate(-360deg) scale(1.05); }
    }
    @keyframes wave3 {
        0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(0.95); }
        33% { transform: translate3d(40px, 50px, 0) rotate(120deg) scale(1.1); }
        66% { transform: translate3d(-50px, -30px, 0) rotate(240deg) scale(1); }
        100% { transform: translate3d(0, 0, 0) rotate(360deg) scale(0.95); }
    }
    @keyframes wave4 {
        0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
        33% { transform: translate3d(-40px, -60px, 0) rotate(-120deg) scale(0.9); }
        66% { transform: translate3d(60px, 40px, 0) rotate(-240deg) scale(1.05); }
        100% { transform: translate3d(0, 0, 0) rotate(-360deg) scale(1); }
    }

    @keyframes lineGlow {
        0%, 80%, 100% { border-color: #fff; filter: none; opacity: 0.15; }
        90% { border-color: #4ade80; filter: drop-shadow(0 0 20px rgba(74, 222, 128, 0.6)); opacity: 0.5; }
    }

    .login-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        width: 100%;
        overflow: hidden;
        position: relative;
        z-index: 1;
        padding-top: 18vh; /* Moved up slightly from 25vh */
    }

    .ring {
        position: relative;
        width: 420px;
        height: 420px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .ring i {
        position: absolute;
        inset: 0;
        border: 2px solid #fff;
        transition: 0.5s;
        will-change: transform; /* Performance optimization */
    }

    .ring i:nth-child(1) {
        border-radius: 38% 62% 63% 37% / 41% 44% 56% 59%;
        animation: animate 6s linear infinite;
    }

    .ring i:nth-child(2) {
        border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
        animation: animate 4s linear infinite;
    }

    .ring i:nth-child(3) {
        border-radius: 41% 44% 56% 59% / 38% 62% 63% 37%;
        animation: animate2 10s linear infinite;
    }

    /* Random green effect for one of the rings */
    @keyframes colorChangeGreen {
        0%, 80%, 100% { border-color: #fff; filter: none; }
        90% { border-color: #4ade80; filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.5)); } /* Reduced shadow blur */
    }

    .ring i:nth-child(2) {
        animation: animate 4s linear infinite, colorChangeGreen 7s linear infinite;
    }

    .ring:hover i {
        border: 6px solid #4ade80;
        filter: drop-shadow(0 0 12px rgba(74, 222, 128, 0.6)); /* Reduced shadow blur */
    }

    @keyframes animate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes animate2 {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
    }

    .login-form-box {
        position: absolute;
        width: 280px;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        gap: 15px;
        z-index: 2;
        padding: 15px;
    }

    .login-form-box h2 {
        font-size: 2em;
        color: #fff;
        margin-bottom: 10px;
        font-weight: 600;
        text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }

    .inputBx {
        position: relative;
        width: 100%;
    }

    .inputBx input {
        width: 100%;
        padding: 12px 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid #fff;
        border-radius: 40px;
        font-size: 1.1em;
        color: #fff;
        outline: none;
        transition: 0.3s;
    }

    .inputBx input:focus {
        border-color: #4ade80;
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
    }

    .inputBx input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    .btn-submit {
        width: 100%;
        padding: 12px;
        background: linear-gradient(45deg, #22c55e, #4ade80);
        border: none;
        border-radius: 40px;
        color: #fff;
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-submit:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
    }

    .links {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px;
    }

    .links a {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 0.9em;
        transition: 0.3s;
    }

    .links a:hover {
        color: #4ade80;
    }

    .alert-container {
        position: absolute;
        top: -60px;
        width: 100%;
        z-index: 10;
    }

    /* Wide Out Transition - COOL & SMOOTH */
    .wide-out .ring i {
        transform: scale(25) rotate(180deg) !important; /* Scale more and spin */
        opacity: 0;
        transition: 1.8s cubic-bezier(0.4, 0, 0.2, 1);
        border-width: 0.5px;
        filter: blur(10px) brightness(2); /* Add blur and brightness for portal effect */
    }

    .wide-out .ring i:nth-child(2) {
        transition-delay: 0.1s;
        border-color: #4ade80 !important; /* Flash green */
    }

    .wide-out .ring i:nth-child(3) {
        transition-delay: 0.2s;
        transform: scale(25) rotate(-180deg) !important; /* Counter spin */
    }

    .wide-out .login-form-box {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
        filter: blur(5px);
        transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
    }

    /* Screen flash effect */
    .wide-out::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        opacity: 0;
        z-index: 1000;
        pointer-events: none;
        animation: flash 1.5s ease-out forwards;
    }

    @keyframes flash {
        0% { opacity: 0; }
        70% { opacity: 0.1; }
        100% { opacity: 0; }
    }
</style>

    <style>

        <style>
            .ai-text-animate {
                display: inline-block;
                color: #ffffff;
                font-weight: 800;
                animation: aiFloat 3s ease-in-out infinite;
                position: relative;
                text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            }

            .ai-text-animate .particle {
                position: absolute;
                width: 4px;
                height: 4px;
                background: #fff;
                border-radius: 50%;
                pointer-events: none;
                opacity: 0;
            }

            .ai-text-animate .particle:nth-child(1) {
                top: -5px; left: 50%;
                animation: particleMove 2s infinite 0s;
            }
            .ai-text-animate .particle:nth-child(2) {
                bottom: -5px; left: 20%;
                animation: particleMove 2s infinite 0.5s;
            }
            .ai-text-animate .particle:nth-child(3) {
                top: 50%; right: -5px;
                animation: particleMove 2s infinite 1s;
            }

            @keyframes aiFloat {
                0%, 100% { transform: translateY(0) scale(1); }
                50% { transform: translateY(-3px) scale(1.05); }
            }

            @keyframes particleMove {
                0% { transform: translate(0, 0) scale(0); opacity: 0; }
                50% { transform: translate(var(--x, 10px), var(--y, -10px)) scale(1); opacity: 1; }
                100% { transform: translate(var(--x2, 20px), var(--y2, -20px)) scale(0); opacity: 0; }
            }

            /* Custom properties for particle directions */
            .ai-text-animate .particle:nth-child(1) { --x: 5px; --y: -15px; --x2: 10px; --y2: -30px; }
            .ai-text-animate .particle:nth-child(2) { --x: -10px; --y: 15px; --x2: -20px; --y2: 30px; }
            .ai-text-animate .particle:nth-child(3) { --x: 15px; --y: 5px; --x2: 30px; --y2: 10px; }

                                    <div class="alert alert-warning fade-in glass" role="alert" style="margin-bottom: 1rem; border: 1px solid var(--glass-border);">
                                        <strong>
                                            <i class="bi bi-info-circle"></i>
                                        </strong>

                                    </div>

        <!-- Page Content -->
        <main class="main-content-wrapper">
            
<div class="bg-animation">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="dot" style="left: 10%; animation-delay: 0s; width: 2px; height: 2px;"></div>
    <div class="dot" style="left: 25%; animation-delay: 2s; width: 3px; height: 3px;"></div>
    <div class="dot" style="left: 40%; animation-delay: 5s; width: 2px; height: 2px;"></div>
    <div class="dot" style="left: 55%; animation-delay: 1s; width: 4px; height: 4px;"></div>
    <div class="dot" style="left: 70%; animation-delay: 8s; width: 2px; height: 2px;"></div>
    <div class="dot" style="left: 85%; animation-delay: 3s; width: 3px; height: 3px;"></div>
</div>

        <div class="line-box"><i></i></div>
        <div class="line-box"><i></i></div>

    <div class="ring">
        <i></i>
        <i></i>

                            <div class="alert alert-warning alert-dismissible fade show py-2 small border-0 bg-dark text-light" role="alert" style="border-radius: 10px; background: rgba(0,0,0,0.6) !important; backdrop-filter: blur(5px);">

                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close" style="padding: 0.75rem;"></button>

                <a href="/">Home</a>

</div>

<script>
    // Initialize background animation for login page
    document.addEventListener('DOMContentLoaded', function() {
        // Randomize position of background circles
        const lineBoxes = document.querySelectorAll('.line-box');
        lineBoxes.forEach(box => {
            const randomTop = Math.floor(Math.random() * 80) + 10; // 10% to 90%
            const randomLeft = Math.floor(Math.random() * 80) + 10; // 10% to 90%
            const randomSize = Math.floor(Math.random() * 200) + 250; // 250px to 450px
            
            box.style.top = randomTop + '%';
            box.style.left = randomLeft + '%';
            box.style.width = randomSize + 'px';
            box.style.height = randomSize + 'px';
            box.style.opacity = '1'; // Show them after positioning
        });
        
        console.log("LOGIN: Using randomized background animation.");
    });

    document.querySelector('form').addEventListener('submit', function(e) {
        if (this.checkValidity()) {
            e.preventDefault();
            const container = document.querySelector('.login-container');
            container.classList.add('wide-out');
            
            // Wait for animation to progress before submitting
            setTimeout(() => {
                this.submit();
            }, 1000);
        }
    });
</script>

    <script>
        // Initialize global background animation if the canvas exists
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof window.initMovingDots === 'function') {
                const canvas = document.getElementById('heroCanvas');
                if (canvas) {
                    console.log("BASE: Initializing global background animation...");
                    window.initMovingDots('heroCanvas');
                }
            }
        });
    </script>
